services:
  - type: web
    name: hayyakvisa-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        value: https://hayyakvisa.vercel.app
      # MONGODB_URI and JWT_SECRET must be set in the Render Dashboard
